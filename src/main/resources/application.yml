spring:
  application:
    name: travel-system

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/travelsystem?serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: ryemon1122
    type: com.alibaba.druid.pool.DruidDataSource

  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 3000

  jackson:
    serialization:
      write-dates-as-timestamps: false

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

server:
  port: 8080

management:
  endpoint:
    health:
      show-details: always
      show-components: always
  health:
    redis:
      enabled: false
  endpoints:
    web:
      exposure:
        include: "health,info"

logging:
  level:
    com.travel: INFO
    com.baomidou.mybatisplus: INFO

jwt:
  secret: change_this_to_a_strong_secret_key
  expire-seconds: 3600

app:
  security:
    # 生产/默认环境开启鉴权；开发环境可在 application-dev.yml 覆盖为 false。
    auth-enabled: true
  dev-seed:
    # 全局默认关闭开发种子数据，仅在 dev 配置中开启。
    enabled: true
    # 开发种子数据目录（支持 classpath: 或 file:）。
    path: classpath:dev-seed
    # 地图增量导入配置（JSON），用于声明需要额外读取的景区/POI/设施/道路文件。
    map-import-config: classpath:dev-seed/map-imports.json
  storage:
    preload:
      enabled: false
  admin:
    dev-tools:
      # 管理员开发工具（地名采集/构建）开关，生产环境建议关闭。
      enabled: true
  debug:
    # 调试开关：当数据库不可用时，跳过预加载并允许应用启动。
    ignore-db-connection-failure: false

